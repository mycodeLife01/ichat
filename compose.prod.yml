name: ichat

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    # Bumped from default 100 to cover 2 worker replicas (each ~40 pool conns),
    # API replica (~40), and LISTEN connections (api + each worker).
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: ghcr.io/${GITHUB_REPO:-mycodelife01/ichat}:latest
    env_file:
      - .env
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrate

  api:
    image: ghcr.io/${GITHUB_REPO:-mycodelife01/ichat}:latest
    restart: unless-stopped
    env_file:
      - .env
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    image: ghcr.io/${GITHUB_REPO:-mycodelife01/ichat}:latest
    restart: unless-stopped
    env_file:
      - .env
    command: ["python", "-m", "app.worker"]
    deploy:
      replicas: 2
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "8443:8443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      - api

volumes:
  postgres_data:
