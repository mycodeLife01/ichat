<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // iOS Safari auto-zooms the page when focusing inputs with font-size
      // < 16px (all of ours are). maximum-scale=1 suppresses only that zoom —
      // iOS ignores it for user pinch gestures, so accessibility is intact.
      // Applied via JS on iOS only: Android Chrome would honor maximum-scale
      // and actually block pinch-zoom.
      if (
        /iPad|iPhone|iPod/.test(navigator.userAgent) ||
        (navigator.userAgent.includes("Mac") && navigator.maxTouchPoints > 1)
      ) {
        document
          .querySelector('meta[name="viewport"]')
          .setAttribute(
            "content",
            "width=device-width, initial-scale=1.0, maximum-scale=1.0",
          );
      }
    </script>
    <title>iChat</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      ::before,
      ::after {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }

      body {
        background: #fbfbfa;
        color: #1a1a19;
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          "PingFang SC",
          "Hiragino Sans GB",
          "Microsoft YaHei",
          "Source Han Sans CN",
          sans-serif;
        font-size: 15px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      button,
      input {
        font: inherit;
      }

      .auth-screen {
        position: relative;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background: #fbfbfa;
        padding: 32px 24px;
        color: #1a1a19;
      }

      .auth-bg-fallback {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        color: #1a1a19;
      }

      .auth-bg-fallback svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
      }

      .auth-card {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 420px;
        border: 1px solid rgba(20, 20, 19, 0.08);
        border-radius: 18px;
        background: #ffffff;
        padding: 36px 36px 28px;
        box-shadow:
          inset 0 1px 0 rgb(255 255 255 / 90%),
          0 2px 6px rgb(20 20 19 / 4%),
          0 24px 64px rgb(20 20 19 / 8%);
      }

      :where(.auth-brand) {
        display: block;
        color: #1a1a19;
        font-size: 22px;
        font-weight: 600;
      }

      :where(.auth-subtitle) {
        margin: 10px 0 0;
        color: #6b6a66;
        font-size: 13px;
        line-height: 1.55;
      }

      :where(.auth-tabs) {
        display: flex;
        margin: 0 0 22px;
        border-bottom: 1px solid rgba(20, 20, 19, 0.08);
      }

      :where(.auth-tabs button) {
        margin-right: 24px;
        border: 0;
        border-bottom: 2px solid transparent;
        background: transparent;
        padding: 10px 0;
        color: #95938e;
        cursor: pointer;
        font-weight: 500;
      }

      :where(.auth-tabs button[aria-selected="true"]) {
        border-bottom-color: #1a1a19;
        color: #1a1a19;
      }

      :where(.auth-form) {
        display: flex;
        flex-direction: column;
      }

      :where(.auth-card [aria-hidden="true"]) {
        display: none;
      }

      :where(.auth-field) {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 14px;
      }

      :where(.auth-label) {
        color: #1a1a19;
        font-size: 12.5px;
        font-weight: 500;
      }

      :where(.auth-input) {
        width: 100%;
        border: 1px solid rgba(20, 20, 19, 0.14);
        border-radius: 10px;
        background: #fbfbfa;
        color: #1a1a19;
        padding: 11px 14px;
      }

      :where(.auth-submit) {
        width: 100%;
        margin-top: 8px;
        border: 0;
        border-radius: 10px;
        background: #1a1a19;
        color: #fbfbfa;
        cursor: pointer;
        padding: 12px;
        font-size: 14px;
        font-weight: 500;
      }

      :where(.auth-divider) {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 18px 0 16px;
        color: #95938e;
        font-family:
          "JetBrains Mono",
          ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
        font-size: 11px;
        text-transform: uppercase;
      }

      :where(.auth-divider)::before,
      :where(.auth-divider)::after {
        content: "";
        height: 1px;
        flex: 1;
        background: rgba(20, 20, 19, 0.08);
      }

      :where(.auth-footer) {
        margin-top: 16px;
        color: #95938e;
        text-align: center;
        font-size: 12.5px;
      }

      :where(.auth-link) {
        margin-left: 4px;
        border: 0;
        background: transparent;
        color: #1a1a19;
        cursor: pointer;
        padding: 0;
        text-decoration: underline;
        text-decoration-color: rgba(20, 20, 19, 0.14);
        text-underline-offset: 2px;
      }

      .auth-legal {
        position: absolute;
        right: 0;
        bottom: 24px;
        left: 0;
        z-index: 1;
        margin: 0;
        color: #95938e;
        text-align: center;
        font-family:
          "JetBrains Mono",
          ui-monospace,
          SFMono-Regular,
          Menlo,
          monospace;
        font-size: 11px;
      }

      @media (max-width: 480px) {
        .auth-card {
          border-radius: 16px;
          padding: 28px 24px 22px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
