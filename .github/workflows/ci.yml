name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ichat
          POSTGRES_PASSWORD: ichat_password
          POSTGRES_DB: ichat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ichat -d ichat"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy app

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql+asyncpg://ichat:ichat_password@localhost:5432/ichat
        run: uv run alembic upgrade head

      - name: Test (pytest)
        env:
          DATABASE_URL: postgresql+asyncpg://ichat:ichat_password@localhost:5432/ichat
          JWT_SECRET: ci-test-secret
          DEEPSEEK_API_KEY: fake-key-for-ci
          DEEPSEEK_BASE_URL: https://api.deepseek.com
          DEEPSEEK_MODEL: deepseek-chat
        run: uv run pytest --tb=short -q

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ichat-api:ci .
