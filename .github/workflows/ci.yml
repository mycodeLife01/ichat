name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://ichat:ichat_password@localhost:5432/ichat
      JWT_SECRET: ci-test-secret
      JWT_ACCESS_TOKEN_TTL_SECONDS: "900"
      REFRESH_TOKEN_TTL_SECONDS: "2592000"
      DEEPSEEK_API_KEY: fake-key-for-ci
      DEEPSEEK_BASE_URL: https://api.deepseek.com
      DEEPSEEK_MODEL: deepseek-test
      DEEPSEEK_THINKING_ENABLED: "false"
      DEEPSEEK_REASONING_EFFORT: "high"
      SUMMARY_PROVIDER_NAME: deepseek
      SUMMARY_MODEL: deepseek-test
      DEFAULT_SYSTEM_PROMPT: "You are a helpful assistant."
      RUN_LEASE_SECONDS: "60"
      WORKER_POLL_INTERVAL_SECONDS: "2"
      WORKER_HEARTBEAT_INTERVAL_SECONDS: "10"
      LOG_LEVEL: INFO
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ichat
          POSTGRES_PASSWORD: ichat_password
          POSTGRES_DB: ichat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ichat -d ichat"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy app

      - name: Run database migrations
        run: uv run alembic upgrade head

      - name: Test (pytest)
        run: uv run pytest --tb=short -q

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ichat-api:ci .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (eslint)
        run: pnpm run lint

      - name: Type check (tsc)
        run: pnpm run typecheck

      - name: Test (vitest)
        run: pnpm exec vitest run

      - name: Build (vite)
        run: pnpm run build
