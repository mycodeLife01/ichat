name: ichat

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:?POSTGRES_PORT is required}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
    image: ichat-api:local
    env_file:
      - .env
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${API_PORT:?API_PORT is required}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
    image: ichat-worker:local
    env_file:
      - .env
    command: ["python", "-m", "app.worker"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
