name: ichat

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    # Match compose.prod.yml: leave headroom for multiple worker replicas and
    # LISTEN connections (one per worker + one per API process for SSE fanout).
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"
    ports:
      - "${POSTGRES_PORT:?POSTGRES_PORT is required}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # Celery broker + auth cooldown / IP rate-limit keys. Internal only.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
    image: ichat-api:local
    env_file:
      - .env
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
    image: ichat-api:local
    env_file:
      - .env
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${API_PORT:?API_PORT is required}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
    image: ichat-worker:local
    env_file:
      - .env
    command: ["python", "-m", "app.worker"]
    deploy:
      replicas: 2
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  celery-worker:
    build:
      context: .
    image: ichat-worker:local
    env_file:
      - .env
    # Executes send_email_outbox / sweep_email_outbox. Safe to scale to N.
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=info"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: .
    image: ichat-worker:local
    env_file:
      - .env
    # Schedules the periodic outbox sweep ONLY. Must be a single instance
    # (multiple beats double-schedule). Execution happens on celery-worker.
    command: ["celery", "-A", "app.tasks.celery_app", "beat", "--loglevel=info"]
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
